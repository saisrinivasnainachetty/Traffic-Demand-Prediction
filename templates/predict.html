<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Traffic Prediction</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1 class="text-center mb-5">
Traffic Demand Prediction
</h1>

<form action="/predict" method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label>Day of Week</label>

<select name="day_of_week" class="form-control">

<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
<option>Saturday</option>
<option>Sunday</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Hour</label>

<input
type="number"
name="hour"
min="0"
max="23"
class="form-control"
required>

</div>

</div>

<div class="row">

    <div class="col-md-6 mb-3">
        <label>Location</label>

        <select name="location" class="form-control">

            <option>Airport</option>
            <option>Bus Stand</option>
            <option>Downtown</option>
            <option>Hospital</option>
            <option>IT Park</option>
            <option>Industrial Area</option>
            <option>Railway Station</option>
            <option>Residential Area</option>
            <option>Shopping Mall</option>
            <option>University</option>

        </select>
    </div>

    <div class="col-md-6 mb-3">

        <label>Road Type</label>

        <select name="road_type" class="form-control">

            <option>Bridge</option>
            <option>Highway</option>
            <option>Junction</option>
            <option>Main Road</option>
            <option>Street</option>

        </select>

    </div>

</div>

<div class="row">

    <div class="col-md-6 mb-3">

        <label>Weather</label>

        <select name="weather" class="form-control">

            <option>Sunny</option>
            <option>Cloudy</option>
            <option>Rainy</option>
            <option>Foggy</option>

        </select>

    </div>

    <div class="col-md-6 mb-3">

        <label>Temperature (°C)</label>

        <input
        type="number"
        step="0.1"
        name="temperature"
        class="form-control"
        required>

    </div>

</div>

<div class="row">

    <div class="col-md-6 mb-3">
        <label>Humidity (%)</label>
        <input
            type="number"
            name="humidity"
            class="form-control"
            required>
    </div>

    <div class="col-md-6 mb-3">
        <label>Rainfall (mm)</label>
        <input
            type="number"
            step="0.1"
            name="rainfall"
            class="form-control"
            required>
    </div>

</div>

<div class="row">

    <div class="col-md-6 mb-3">
        <label>Traffic Signals</label>
        <input
            type="number"
            name="traffic_signals"
            class="form-control"
            required>
    </div>

    <div class="col-md-6 mb-3">
        <label>Lanes</label>
        <input
            type="number"
            name="lanes"
            class="form-control"
            required>
    </div>

</div>

<div class="row">

    <div class="col-md-6 mb-3">
        <label>Large Vehicles</label>
        <input
            type="number"
            name="large_vehicles"
            class="form-control"
            required>
    </div>

    <div class="col-md-6 mb-3">
        <label>Landmark</label>

        <select name="landmark" class="form-control">

            <option>Hospital</option>
            <option>Mall</option>
            <option>Market</option>
            <option>Metro</option>
            <option>Office</option>
            <option>Park</option>
            <option>School</option>

        </select>

    </div>

</div>

<div class="row">

    <div class="col-md-6 mb-3">

        <label>Event</label>

        <select name="event" class="form-control">

            <option>No</option>
            <option>Yes</option>

        </select>

    </div>

    <div class="col-md-6 mb-3">

        <label>Traffic Density</label>

        <input
            type="number"
            name="traffic_density"
            class="form-control"
            required>

    </div>

</div>

<div class="text-center mt-4">

    <button
        type="submit"
        class="btn btn-primary btn-lg">

        Predict Traffic

    </button>

</div>

</form>

</div>

</body>

</html>
